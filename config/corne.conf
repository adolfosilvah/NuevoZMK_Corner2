# --- Opciones de Pantalla y LEDs ---
# Si tu teclado tiene componentes, cámbialos a 'y'
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

# --- Gestión de Energía (Optimizada) ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=900000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_PM_SOFT_OFF=y

# --- Funcionalidad ---
CONFIG_ZMK_MOUSE=n

# --- Batería (Configuración para Split) ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- Bluetooth (Configuración Estable) ---
CONFIG_BT=y
CONFIG_ZMK_BLE=y    
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BAS=y

# Alcance Bluetooth (Potencia +4 dBm)
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# --- Mejora de compatibilidad moderna ---
# Previene desconexiones en sistemas operativos modernos
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# --- Identificación del teclado ---
CONFIG_ZMK_KEYBOARD_NAME="Corne2"